# Region-scope defaults for nonprod/eastus clusters.
#
# Merged under every cluster file by terraform/config-loader/load.sh:
#   fleet/_defaults.yaml << env/_defaults.yaml << region/_defaults.yaml << cluster.yaml
#
# Per-env-region networking config (address_space, egress_next_hop_ip,
# create_reverse_peering, mgmt_environment_for_vnet_peering) lives in
# `_fleet.yaml` under `networking.envs.nonprod.regions.eastus` — not
# here. This file is a placeholder for future region-wide
# nonprod/eastus tunables that do NOT belong in _fleet.yaml (e.g.
# region-specific cluster defaults). Empty until the first such
# tunable appears.
{}
