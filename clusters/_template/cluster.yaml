# Cluster template. Copy with `cp -r` under clusters/<env>/<region>/<name>/
# and fill placeholders.
#
#   cluster.name        : final directory segment (derived; do not set)
#   cluster.env         : 1st segment under clusters/ (derived; do not set)
#   cluster.region      : 2nd segment under clusters/ (derived; do not set)
#
# Only declare fields that differ from the _defaults.yaml chain.

cluster:
  role: workload                                    # management | workload
  # subscription_id is inherited from _fleet.yaml.environments.<env>;
  # override here only if a single cluster lives in a different sub.
  resource_group: rg-aks-<env>-<region>-<NN>

networking:
  # Per-cluster index into the env+region VNet's two subnet pools
  # (PLAN §3.4). Required; integer in [0, capacity-1] where
  # capacity = min(16, 2 * (2^(24-N) - 2)) for a /N env VNet
  # (/20 → 16, /21 → 12, /22 → 4). Immutable — changing this after
  # initial apply forces cluster re-create; PR-check blocks
  # mutations. Unique per (env, region). The slot indexes both pools
  # simultaneously, yielding:
  #   snet-aks-api-<name>    = i-th /28 of the env VNet's API pool
  #                            (delegated; AKS api-server VNet integration)
  #   snet-aks-nodes-<name>  = i-th /25 of the env VNet's nodes pool
  #                            (sized for Azure CNI Overlay + Cilium)
  # VNet id, DNS link list, and subnet names are all derived — do
  # NOT set them here.
  subnet_slot: 0

# node_pools:                                       # uncomment to override defaults
