# Should fail: F19 mistake. `use_remote_gateways` belongs nested under `hub_peering:`,
# not at the per-region top level. Schema enforces the closed key set on the region block.
fleet:
  name: acme
  display_name: Acme
  tenant_id: 11111111-1111-1111-1111-111111111111
  github_org: acme-co
  github_repo: platform-fleet
  team_template_repo: team-repo-template
acr:
  name_override: ""
  resource_group: rg-fleet-shared
  subscription_id: 33333333-3333-3333-3333-333333333333
  location: eastus
  sku: Premium
runners_keyvault:
  name_override: ""
  resource_group: rg-fleet-shared
  location: eastus
state:
  storage_account_name_override: ""
  resource_group: rg-fleet-tfstate
  subscription_id: 33333333-3333-3333-3333-333333333333
  containers:
    fleet: tfstate-fleet
networking:
  private_dns_zones:
    blob: null
    vaultcore: null
    azurecr: null
    grafana: null
  envs:
    mgmt:
      regions:
        eastus:
          address_space: ["10.50.0.0/20"]
          egress_next_hop_ip: null
          hub_network_resource_id: null
          use_remote_gateways: true   # WRONG: must be hub_peering: { use_remote_gateways: true }
github_app:
  fleet_runners:
    app_id: null
    installation_id: null
    private_key_kv_secret: fleet-runners-app-pem
  fleet_meta:
    app_id: null
    client_id: null
    installation_id: null
    private_key_kv_secret: fleet-meta-app-pem
aad:
  argocd:
    display_name: acme-argocd
    owners: []
    group_claim_name: groups
  kargo:
    display_name: acme-kargo
    owners: []
    group_claim_name: groups
  grafana:
    sku: Standard
    zone_redundancy: true
    api_key_enabled: false
    deterministic_outbound_ip: true
  aks:
    tenant_id: 11111111-1111-1111-1111-111111111111
    disable_local_accounts: true
    enable_azure_rbac: true
observability:
  network_isolation:
    mode: network_security_perimeter
    nsp_profile_name: default
    grafana_private_dns_zone: privatelink.grafana.azure.com
  monitor_workspace:
    public_network_access: Disabled
  data_collection_endpoint:
    public_network_access: Disabled
  action_group:
    short_name_prefix: acme
envs:
  mgmt:
    subscription_id: 33333333-3333-3333-3333-333333333333
    location: eastus
    aks: { admin_groups: [], rbac_cluster_admins: [], rbac_readers: [] }
    grafana: { admins: [], editors: [] }
    action_group: { receivers: {} }
dns:
  fleet_root: int.acme.example
  resource_group_pattern: rg-dns-{env}
