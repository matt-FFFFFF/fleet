# yaml-language-server: $schema=/schemas/fleet.v1.schema.json
# Fleet-scope configuration — GENERATED by ./init-fleet.sh (init/ Terraform module).
#
# Edit this file directly to change fleet identity, AAD group bindings, DNS
# root, subscriptions, observability settings, etc. It is the single source
# of truth consumed by:
#   - bootstrap/fleet         (yamldecode in locals)
#   - bootstrap/environment   (yamldecode in locals, selects envs[var.env])
#   - config-loader/load.sh   (deep-merged into every cluster's tfvars)
#
# Fields that ship as `null` or `[]` with a `TODO` comment require
# cloud-side identities (AAD group object IDs, VNet resource IDs, GitHub
# App coordinates) that typically aren't known at init time. Fill each
# one in before running the stage that consumes it. `bootstrap/fleet`
# guards its required fields with `precondition` blocks that name the
# exact yaml path on failure; other stages (notably `bootstrap/
# environment`) do not yet enforce every `TODO` field uniformly, so
# leaving a per-env list empty may let an apply succeed while skipping
# required wiring (e.g. no Private DNS zone VNet links). Treat the
# `TODO` comments as the source of truth for what must be set.

fleet:
  name: acme
  display_name: Acme Platform
  tenant_id: 11111111-1111-1111-1111-111111111111
  github_org: acme-co
  github_repo: platform-fleet
  team_template_repo: team-repo-template

acr:
  # Default name derived: acr<fleet.name>shared. Override via `name_override`.
  name_override: ""
  resource_group: rg-fleet-shared
  subscription_id: 33333333-3333-3333-3333-333333333333
  location: eastus
  sku: Premium

runners_keyvault:                                      # RUNNERS KV (one; bootstrap/fleet)
  # Default name derived: kv-<fleet.name>-runners. Override via `name_override`.
  name_override: ""
  resource_group: rg-fleet-shared
  location: eastus
  # Created by Stage -1 (bootstrap/fleet) so the runner pool's KV-reference
  # for the GitHub App PEM resolves at deploy time. The vault is strictly
  # private — publicNetworkAccess=Disabled, defaultAction=Deny — with a
  # private endpoint on the mgmt env-region VNet's snet-pe-fleet subnet
  # and DNS registered in the central privatelink.vaultcore.azure.net zone.
  #
  # Stores fleet-wide secrets:
  #   fleet-runners-app-pem        (Stage -1; this pool's GH App PEM; seeded by init-gh-apps.sh)
  #   fleet-meta-app-pem           (Stage -1; fleet-meta App PEM; seeded by init-gh-apps.sh)
  # Argo / Kargo OIDC secrets live in the mgmt cluster's KV, not here.

state:
  # Default name derived: st<fleet.name>tfstate. Override via `storage_account_name_override`.
  storage_account_name_override: ""
  resource_group: rg-fleet-tfstate
  subscription_id: 33333333-3333-3333-3333-333333333333
  containers:
    fleet: tfstate-fleet                               # bootstrap/{fleet,environment,team}

networking:                                            # Repo-owned VNets + BYO hub refs & central PDZs (PLAN §3.4)
  # Central private DNS zones for PE A-record registration. All BYO —
  # never created by this repo, only referenced by resource id. Every
  # PE (tfstate SA, runners KV, fleet ACR, env Grafana) registers into
  # the matching central zone.
  private_dns_zones:
    # TODO: full resource id of privatelink.blob.core.windows.net
    blob: /subscriptions/66666666-6666-6666-6666-666666666666/resourceGroups/rg-hub-dns/providers/Microsoft.Network/privateDnsZones/privatelink.blob.core.windows.net
    # TODO: full resource id of privatelink.vaultcore.azure.net
    vaultcore: /subscriptions/66666666-6666-6666-6666-666666666666/resourceGroups/rg-hub-dns/providers/Microsoft.Network/privateDnsZones/privatelink.vaultcore.azure.net
    # TODO: full resource id of privatelink.azurecr.io
    azurecr: /subscriptions/66666666-6666-6666-6666-666666666666/resourceGroups/rg-hub-dns/providers/Microsoft.Network/privateDnsZones/privatelink.azurecr.io
    # TODO: full resource id of privatelink.grafana.azure.com
    grafana: /subscriptions/66666666-6666-6666-6666-666666666666/resourceGroups/rg-hub-dns/providers/Microsoft.Network/privateDnsZones/privatelink.grafana.azure.com
  # Env-tier VNets. One VNet per env-per-region for every env,
  # including `mgmt`. `bootstrap/fleet` owns its own resource subnets
  # inside the mgmt VNet (CI-plane PEs for tfstate SA, runners KV, fleet
  # ACR, plus the ACA-delegated runner-pool Container App Environment);
  # `bootstrap/environment` owns the cluster-workload subnets (api
  # pool, nodes pool, env-PE) on every env VNet uniformly, including
  # mgmt. Subnet CIDRs derived per docs/naming.md from the
  # address_space below. Minimum /20.
  #
  # Per-region fields:
  #   address_space             VNet CIDR list; /20 or wider. Per-cluster
  #                             /28 api + /25 nodes subnets are carved
  #                             from the 2nd-onward /24s of this space
  #                             by Stage 1, keyed off `networking.subnet_slot`
  #                             in each cluster.yaml (/20 → 16 slots;
  #                             /21 → 12; /22 → 4). See PLAN §3.4.
  #   egress_next_hop_ip        Private IP of the hub firewall / NVA that
  #                             terminates the 0.0.0.0/0 UDR on the
  #                             cluster-workload subnets in this
  #                             env-region. `bootstrap/environment`
  #                             authors `rt-aks-<env>-<region>` on every
  #                             region unconditionally; the
  #                             `0.0.0.0/0` route entry is only created
  #                             when this is non-null. Stage 1 fails
  #                             fast at cluster apply if null for a
  #                             region that hosts clusters. Adopters
  #                             leave `null` in the template repo and
  #                             fill in before the first cluster apply
  #                             in each region.
  #   hub_network_resource_id   ARM resource id of the adopter hub VNet
  #                             this env-region hub-peers to. Nullable
  #                             on every env (including mgmt); null
  #                             opts out of hub peering (adopter-
  #                             managed routing). Mgmt↔env peering is
  #                             implicit: bootstrap/environment
  #                             iterates `networking.envs.mgmt.regions`
  #                             same-region-else-first, so no selector
  #                             variable is needed.
  #   create_reverse_peering    Optional, default true. Set false when
  #                             the hub is owned by a team that forbids
  #                             spoke-initiated reverse peerings.
  #   hub_peering               Optional nested block. Currently
  #                             supports one field:
  #                               use_remote_gateways  bool, default
  #                                                    false. Set true
  #                                                    when the hub
  #                                                    has a gateway
  #                                                    (ExpressRoute
  #                                                    or VPN) whose
  #                                                    routes this
  #                                                    spoke should
  #                                                    inherit. Plumbed
  #                                                    to
  #                                                    `hub_peering_options_tohub.use_remote_gateways`
  #                                                    on the spoke→hub
  #                                                    peering. NOTE:
  #                                                    this field MUST
  #                                                    be nested under
  #                                                    `hub_peering:` —
  #                                                    writing
  #                                                    `use_remote_gateways:`
  #                                                    at the region
  #                                                    top level is
  #                                                    rejected by the
  #                                                    fleet-identity
  #                                                    schema validator.
  #   dns_servers               Optional, default `[]`. VNet-level DNS
  #                             servers for this env-region's spoke
  #                             VNet. Empty list means Azure-provided
  #                             DNS (168.63.129.16). Set to a list of
  #                             hub-resolver IPs when this env-region
  #                             requires forwarder-based resolution
  #                             (on-prem hostnames, Azure Private DNS
  #                             Resolver inbound endpoints, etc.).
  #
  # Pod CIDR: all clusters share 100.64.0.0/16 (hard-coded in
  # modules/aks-cluster). Non-routable under CNI Overlay + Cilium;
  # disambiguation in logs/metrics comes from `_ResourceId` / cluster
  # name, not from the pod IP itself. See PLAN §3.4 Implementation
  # status.
  envs:
    mgmt:
      regions:
        eastus:
          address_space: ["10.50.0.0/20"]
          # Private IP of the hub firewall / NVA. Broadcast from
          # init-fleet.sh's single egress_next_hop_ip prompt to every
          # env's primary_region entry (PLAN §3.4; F13 Option B).
          # Per-env / per-region overrides go here post-init.
          egress_next_hop_ip: 10.0.0.4
          # TODO: full ARM resource id of the mgmt hub VNet in eastus, or null to opt out of hub peering.
          hub_network_resource_id: "/subscriptions/66666666-6666-6666-6666-666666666666/resourceGroups/rg-hub/providers/Microsoft.Network/virtualNetworks/vnet-hub-mgmt-eastus"
          # hub_peering:
          #   use_remote_gateways: false  # set true when the hub has an ExpressRoute / VPN gateway whose routes this spoke should inherit.
          # dns_servers: []  # default = Azure-provided DNS (168.63.129.16). Set to hub-resolver IPs when this env-region requires forwarder-based DNS.
    nonprod:
      regions:
        eastus:
          address_space: ["10.70.0.0/20"]
          # Private IP of the hub firewall / NVA. Broadcast from
          # init-fleet.sh's single egress_next_hop_ip prompt to every
          # env's primary_region entry (PLAN §3.4; F13 Option B).
          # Per-env / per-region overrides go here post-init.
          egress_next_hop_ip: 10.0.0.4
          # TODO: full ARM resource id of the nonprod hub VNet in eastus, or null to opt out of hub peering.
          hub_network_resource_id: "/subscriptions/66666666-6666-6666-6666-666666666666/resourceGroups/rg-hub/providers/Microsoft.Network/virtualNetworks/vnet-hub-nonprod-eastus"
          # hub_peering:
          #   use_remote_gateways: false  # set true when the hub has an ExpressRoute / VPN gateway whose routes this spoke should inherit.
          # dns_servers: []  # default = Azure-provided DNS (168.63.129.16). Set to hub-resolver IPs when this env-region requires forwarder-based DNS.
    prod:
      regions:
        eastus:
          address_space: ["10.80.0.0/20"]
          # Private IP of the hub firewall / NVA. Broadcast from
          # init-fleet.sh's single egress_next_hop_ip prompt to every
          # env's primary_region entry (PLAN §3.4; F13 Option B).
          # Per-env / per-region overrides go here post-init.
          egress_next_hop_ip: 10.0.0.4
          # TODO: full ARM resource id of the prod hub VNet in eastus, or null to opt out of hub peering.
          hub_network_resource_id: "/subscriptions/66666666-6666-6666-6666-666666666666/resourceGroups/rg-hub/providers/Microsoft.Network/virtualNetworks/vnet-hub-prod-eastus"
          # hub_peering:
          #   use_remote_gateways: false  # set true when the hub has an ExpressRoute / VPN gateway whose routes this spoke should inherit.
          # dns_servers: []  # default = Azure-provided DNS (168.63.129.16). Set to hub-resolver IPs when this env-region requires forwarder-based DNS.

github_app:
  fleet_runners:                                       # KEDA polling App (actions:read + metadata:read)
    app_id: null                                       # TODO post-init (numeric GitHub App ID; init-gh-apps.sh patches)
    installation_id: null                              # TODO post-init (init-gh-apps.sh patches)
    private_key_kv_secret: fleet-runners-app-pem       # Secret name in the runners KV (init-gh-apps.sh seeds it post-bootstrap)
  fleet_meta:                                          # Admin App used by env-bootstrap / team-bootstrap (administration:write etc.)
    app_id: null                                       # TODO post-init (init-gh-apps.sh patches)
    client_id: null                                    # TODO post-init (init-gh-apps.sh patches; consumed by actions/create-github-app-token)
    installation_id: null                              # TODO post-init (init-gh-apps.sh patches)
    private_key_kv_secret: fleet-meta-app-pem          # Secret name in the runners KV (init-gh-apps.sh seeds it post-bootstrap)

aad:
  argocd:
    display_name: acme-argocd
    owners: []                                          # TODO post-init: add AAD object IDs for app owners
    group_claim_name: groups
  kargo:
    display_name: acme-kargo
    owners: []
    group_claim_name: groups
  grafana:
    sku: Standard
    zone_redundancy: true
    api_key_enabled: false                             # AAD only
    deterministic_outbound_ip: true
  aks:
    tenant_id: 11111111-1111-1111-1111-111111111111                            # aadProfile.tenantID; usually == fleet.tenant_id
    disable_local_accounts: true                       # hard requirement; AKS module pin
    enable_azure_rbac: true                            # Azure RBAC for Kubernetes Authorization

observability:
  # Names derived per env by the config-loader:
  #   AMW:     amw-<fleet.name>-<env>
  #   DCE:     dce-<fleet.name>-<env>
  #   Grafana: amg-<fleet.name>-<env>
  #   NSP:     nsp-<fleet.name>-<env>
  #   PE:      pe-amg-<fleet.name>-<env>
  #   RG:      rg-obs-<env>
  #   AG:      ag-<fleet.name>-<env>
  network_isolation:
    mode: network_security_perimeter
    nsp_profile_name: default
    grafana_private_dns_zone: privatelink.grafana.azure.com
  monitor_workspace:
    public_network_access: Disabled
  data_collection_endpoint:
    public_network_access: Disabled
  action_group:
    short_name_prefix: acme                   # <=12 chars; env is appended at render time

envs:
  mgmt:
    subscription_id: 33333333-3333-3333-3333-333333333333
    # Location for mgmt-only resources that are not bound to a cluster
    # env-region (fleet resource groups, fleet-meta UAMI, tenant-scope
    # role assignments, fleet ACR). Cluster-bearing env-regions take
    # their location from the `networking.envs.<env>.regions.<region>` key.
    location: eastus
    aks:
      # TODO: AAD group object IDs. Break-glass (bypass K8s RBAC).
      admin_groups: []
      # TODO: AAD group object IDs. Platform SRE (AAD → K8s RBAC).
      rbac_cluster_admins: []
      rbac_readers: []
    grafana:
      # TODO: AAD group object IDs for Grafana admins.
      admins: []
      editors: []
    action_group:
      receivers: {}                                    # TODO: add per-env receivers (pagerduty / slack / email)
  nonprod:
    subscription_id: 44444444-4444-4444-4444-444444444444
    aks:
      # TODO: AAD group object IDs. Break-glass (bypass K8s RBAC).
      admin_groups: []
      # TODO: AAD group object IDs. Platform SRE (AAD → K8s RBAC).
      rbac_cluster_admins: []
      rbac_readers: []
    grafana:
      # TODO: AAD group object IDs for Grafana admins.
      admins: []
      editors: []
    action_group:
      receivers: {}                                    # TODO: add per-env receivers (pagerduty / slack / email)
  prod:
    subscription_id: 55555555-5555-5555-5555-555555555555
    aks:
      # TODO: AAD group object IDs. Break-glass (bypass K8s RBAC).
      admin_groups: []
      # TODO: AAD group object IDs. Platform SRE (AAD → K8s RBAC).
      rbac_cluster_admins: []
      rbac_readers: []
    grafana:
      # TODO: AAD group object IDs for Grafana admins.
      admins: []
      editors: []
    action_group:
      receivers: {}                                    # TODO: add per-env receivers (pagerduty / slack / email)

dns:
  fleet_root: int.acme.example                        # every private zone is a child of this
  # Zone FQDN per cluster is derived:
  #   <cluster.name>.<cluster.region>.<cluster.env>.<fleet_root>
  resource_group_pattern: rg-dns-{env}
