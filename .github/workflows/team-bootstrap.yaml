name: team-bootstrap

# PLAN §10: push-to-main trigger on new `platform-gitops/config/teams/*.yaml`
# files only. Detects newly-added team YAMLs (diff against previous main).
# Derives team name from the filename basename (no `name:` field in the
# file — see PLAN §7). Runs `terraform/bootstrap/team` per new team under
# the `fleet-meta` environment.
#
# Non-new edits (modifications to an existing team file) do NOT trigger
# this workflow — team updates flow through the regular `validate.yaml`
# lint + Argo reconcile path. Only creation triggers Terraform (repo
# creation, branch protection, Kargo App install are one-shot).

on:
  push:
    branches: [main]
    paths:
      - 'platform-gitops/config/teams/*.yaml'
      - '.github/workflows/team-bootstrap.yaml'

concurrency:
  group: team-bootstrap-main
  cancel-in-progress: false

permissions:
  contents: read

# Force GitHub Actions' canonical bash invocation
# (`bash --noprofile --norc -eo pipefail {0}`) on every `run:` step.
# Self-hosted runner images often default to `bash -e {0}` *without*
# pipefail, masking pipeline failures and turning failed bootstrap
# applies green. The explicit default keeps hosted and self-hosted
# behaviour identical.
defaults:
  run:
    shell: bash

# Note: `id-token: write` is granted at job-level on the
# `bootstrap` job (the only one that calls `azure/login`).
# Granting it workflow-wide would force the `detect` job — which
# has no `environment:` — to satisfy
# `include_claim_keys=environment`, which `bootstrap/fleet`
# configures repo-wide. GitHub refuses to start such jobs with
# the error "the claim 'environment' cannot be `null` or empty".

jobs:
  detect:
    name: detect new teams
    runs-on: ubuntu-24.04
    outputs:
      teams:       ${{ steps.detect.outputs.teams }}
      any:         ${{ steps.detect.outputs.any }}
      initialized: ${{ steps.init_guard.outputs.initialized }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Initialisation guard
        id: init_guard
        uses: ./.github/actions/fleet-initialized

      - name: Detect newly-added team YAMLs
        id: detect
        env:
          INITIALIZED: ${{ steps.init_guard.outputs.initialized }}
        run: |
          set -euo pipefail
          if [[ "$INITIALIZED" != "true" ]]; then
            # Emit valid-JSON defaults so downstream `fromJSON(...)`
            # expressions don't hard-fail on empty strings.
            echo 'teams=[]'   >> "$GITHUB_OUTPUT"
            echo 'any=false'  >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # --diff-filter=A → Added files only. HEAD~1..HEAD is the merge
          # commit; any team YAML that is new at HEAD and absent at HEAD~1
          # lands in the list.
          added="$(git diff --diff-filter=A --name-only HEAD~1 HEAD -- \
            'platform-gitops/config/teams/*.yaml' || true)"
          # Emit `{name: <basename-without-.yaml>, path: <full>}` per entry.
          teams="$(
            echo "$added" \
              | while IFS= read -r p; do
                  [[ -z "$p" ]] && continue
                  name="$(basename "$p" .yaml)"
                  jq -cn --arg name "$name" --arg path "$p" \
                    '{name:$name, path:$path}'
                done \
              | jq -cs .
          )"
          echo "$teams" | jq .
          echo "teams=$teams" >> "$GITHUB_OUTPUT"
          echo "any=$(echo "$teams" | jq 'length > 0')" >> "$GITHUB_OUTPUT"

  bootstrap:
    name: bootstrap team=${{ matrix.team.name }}
    needs: detect
    if: needs.detect.outputs.initialized == 'true' && needs.detect.outputs.any == 'true'
    runs-on: [self-hosted]
    environment: fleet-meta
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        team: ${{ fromJSON(needs.detect.outputs.teams) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read Terraform version
        id: tf_version
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ steps.tf_version.outputs.version }}
          terraform_wrapper: false

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Fetch the `fleet-meta` GitHub App PEM from the runners KV and mint
      # a short-lived installation token for the Terraform `github`
      # provider. See env-bootstrap.yaml for the rationale; the auth
      # surface is identical (uami-fleet-meta -> KV Secrets User ->
      # `fleet-meta-app-pem` -> installation token scoped to the fleet
      # repo). The action revokes the token automatically in its
      # `post:` step on job completion.
      - name: Fetch fleet-meta App PEM from KV
        env:
          KV_NAME: ${{ vars.RUNNERS_KV_NAME }}
          SECRET:  ${{ vars.FLEET_META_APP_PEM_KV_SECRET }}
        run: |
          set -euo pipefail
          : "${KV_NAME:?RUNNERS_KV_NAME repo var unset — re-apply bootstrap/fleet}"
          : "${SECRET:?FLEET_META_APP_PEM_KV_SECRET repo var unset — re-apply bootstrap/fleet}"
          pem=$(az keyvault secret show \
            --vault-name "$KV_NAME" \
            --name "$SECRET" \
            --query value -o tsv)
          while IFS= read -r line; do
            [[ -n "$line" ]] && echo "::add-mask::$line"
          done <<< "$pem"
          delim="EOF_$(openssl rand -hex 8)"
          {
            echo "FLEET_META_APP_PEM<<$delim"
            echo "$pem"
            echo "$delim"
          } >> "$GITHUB_ENV"

      - name: Mint fleet-meta App installation token
        id: meta_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id:    ${{ vars.FLEET_META_APP_CLIENT_ID }}
          private-key:  ${{ env.FLEET_META_APP_PEM }}
          owner:        ${{ github.repository_owner }}
          # `bootstrap/team` creates a NEW per-team repo from the
          # team-template repo, so the installation must include both
          # the fleet repo (read team config) and the team-template
          # repo (clone source). Repo creation itself happens via the
          # `administration:write` permission against `owner`.
          repositories: ${{ github.event.repository.name }}

      - name: terraform init
        uses: ./.github/actions/tf-backend-config
        with:
          working-directory: terraform/bootstrap/team
          state-key: bootstrap/team/${{ matrix.team.name }}.tfstate
        env:
          TFSTATE_RESOURCE_GROUP:  ${{ vars.TFSTATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER:       ${{ vars.TFSTATE_CONTAINER }}
          AZURE_SUBSCRIPTION_ID:   ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: terraform apply
        working-directory: terraform/bootstrap/team
        env:
          ARM_USE_OIDC: "true"
          GITHUB_TOKEN: ${{ steps.meta_token.outputs.token }}
          TEAM: ${{ matrix.team.name }}
        run: terraform apply -auto-approve -var "team=${TEAM}"
