name: validate

# Light-weight structural checks on every PR. Today this covers
# `networking.subnet_slot` sanity (PLAN §3.4 Phase F): presence,
# integer-ness, range within the env-region VNet's capacity,
# uniqueness per (env, region), and immutability across a PR. The
# workflow is deliberately cheap — no Azure credentials, no
# `terraform plan` — so it can be made a required status check
# without gating on cloud-side flakiness.
#
# Keep this workflow template-side: adopters inherit it via the
# template clone and need the same checks on their cluster inventory.
# Unlike `status-check.yaml` / `template-selftest.yaml` it is NOT
# deleted by `init-fleet.sh`.

on:
  pull_request:
    paths:
      - 'clusters/**'
      - 'init/**'
      - '.github/scripts/validate-subnet-slots.sh'
      - '.github/workflows/validate.yaml'
      - '.github/fixtures/adopter-test.tfvars'
      - '.terraform-version'
  push:
    branches: [main]
    paths:
      - 'clusters/**'
      - '.github/scripts/validate-subnet-slots.sh'
      - '.terraform-version'

jobs:
  subnet-slots:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the `BASE_REF` immutability check can
          # `git show <base>:clusters/<env>/<region>/<name>/cluster.yaml`
          # without partial-clone misses.
          fetch-depth: 0

      - name: Read Terraform version
        id: tf_version
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tf_version.outputs.version }}
          terraform_wrapper: false

      # `clusters/_fleet.yaml` is a rendered byproduct in the *template*
      # repo (the `init/` + `.github/fixtures/` scaffold lives here and
      # the file is not committed). In *adopter* repos, `init-fleet.sh`
      # removes `init/` and `.github/fixtures/` and the adopter commits
      # their real `clusters/_fleet.yaml` — so this render step must be
      # skipped there. We detect "template-mode" by the presence of
      # both the init module and the test fixture; adopters who kept
      # just one of them by accident will fall through to the skip path.
      - name: Detect template-mode render inputs
        id: render_check
        run: |
          if [[ -d init && -f .github/fixtures/adopter-test.tfvars ]]; then
            echo "template_mode=true" >> "$GITHUB_OUTPUT"
          else
            echo "template_mode=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render clusters/_fleet.yaml from test fixture (template-mode only)
        if: steps.render_check.outputs.template_mode == 'true'
        working-directory: init
        run: |
          terraform init -backend=false
          terraform apply -auto-approve \
            -var-file=../.github/fixtures/adopter-test.tfvars \
            -target=local_file.fleet_yaml

      - name: Verify committed _fleet.yaml exists (adopter-mode only)
        if: steps.render_check.outputs.template_mode == 'false'
        run: |
          # Adopter repos commit clusters/_fleet.yaml (per AGENTS.md it is
          # the single source of truth rendered by init/ on first run and
          # then edited in place). Fail loudly if it's missing rather than
          # silently validating nothing.
          test -f clusters/_fleet.yaml

      - name: Verify yq is available
        run: |
          # ubuntu-24.04 ships mikefarah/yq preinstalled. The runner
          # image is the pin (refreshed on the hosted-runner cadence);
          # we just confirm the binary resolves before running the
          # validator so failures are clearly attributable.
          yq --version

      - name: Validate subnet slots
        env:
          # BASE_REF is empty on push-to-main (no "base" for immutability
          # comparison); the validator skips Rule 5 when unset. On PRs
          # it's `origin/<base>` so the working-copy HEAD is compared
          # against the PR's target branch.
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
        run: |
          .github/scripts/validate-subnet-slots.sh
