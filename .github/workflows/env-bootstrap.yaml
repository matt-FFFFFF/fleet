name: env-bootstrap

# PLAN §10: `workflow_dispatch`, inputs `{env}`. Runs
# `terraform/bootstrap/environment` for a named env under the `fleet-meta`
# GitHub environment (2-reviewer gate, `uami-fleet-meta` UAMI).
#
# Rare, high-blast-radius — used once per env at onboarding and again only
# when the env-scope surface changes (address_space, hub_network_resource_id,
# subscription move, new region under an existing env). Not a CI path.
#
# Produces the per-env repo variables consumed by Stage 1 apply:
# `FLEET_ENV_UAMI_PRINCIPAL_ID`, `<ENV>_<REGION>_VNET_RESOURCE_ID`,
# `<ENV>_<REGION>_NODE_ASG_RESOURCE_ID`,
# `<ENV>_<REGION>_ROUTE_TABLE_RESOURCE_ID`, `MONITOR_WORKSPACE_ID`,
# `DCE_ID`, `ACTION_GROUP_ID`. Those writes are owned by
# `bootstrap/environment/main.github.tf` itself (it has the PAT-equivalent
# via `uami-fleet-meta`'s GH App install), so no post-apply publish step
# is needed in this workflow.

on:
  workflow_dispatch:
    inputs:
      env:
        description: Environment to bootstrap (e.g. mgmt, nonprod, prod)
        required: true
        type: string
      action:
        description: Terraform action
        required: true
        default: plan
        type: choice
        options: [plan, apply]

concurrency:
  group: env-bootstrap-${{ inputs.env }}
  cancel-in-progress: false

permissions:
  contents: read

# Force GitHub Actions' canonical bash invocation
# (`bash --noprofile --norc -eo pipefail {0}`) on every `run:` step.
# Self-hosted runner images often default to `bash -e {0}` *without*
# pipefail, masking pipeline failures and turning failed bootstrap
# applies green. The explicit default keeps hosted and self-hosted
# behaviour identical.
defaults:
  run:
    shell: bash

# Note: `id-token: write` is granted at job-level on the `bootstrap`
# job (the only one that calls `azure/login`). Granting it
# workflow-wide would force the `guard` job — which has no
# `environment:` — to satisfy `include_claim_keys=environment`,
# which `bootstrap/fleet` configures repo-wide. GitHub refuses to
# start such jobs with the error "the claim 'environment' cannot
# be `null` or empty".

jobs:
  guard:
    name: initialisation guard
    runs-on: ubuntu-24.04
    outputs:
      initialized: ${{ steps.init_guard.outputs.initialized }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Initialisation guard
        id: init_guard
        uses: ./.github/actions/fleet-initialized

  bootstrap:
    name: bootstrap env=${{ inputs.env }} (${{ inputs.action }})
    needs: guard
    if: needs.guard.outputs.initialized == 'true'
    runs-on: [self-hosted]
    environment: fleet-meta
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read Terraform version
        id: tf_version
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ steps.tf_version.outputs.version }}
          terraform_wrapper: false

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Fetch the `fleet-meta` GitHub App PEM from the runners KV. The KV
      # is private-only (`publicNetworkAccess = Disabled`); the runner
      # reaches it via the per-pool ACA Job's mgmt-VNet attachment + the
      # adopter-owned `privatelink.vaultcore.azure.net` PDZ. The PEM is
      # exported to the job environment via the multi-line $GITHUB_ENV
      # heredoc protocol (the only way to pass a multi-line secret into
      # a downstream `with:` input), then registered with `::add-mask::`
      # so it never appears in logs even if echoed by mistake.
      - name: Fetch fleet-meta App PEM from KV
        env:
          KV_NAME: ${{ vars.RUNNERS_KV_NAME }}
          SECRET:  ${{ vars.FLEET_META_APP_PEM_KV_SECRET }}
        run: |
          set -euo pipefail
          : "${KV_NAME:?RUNNERS_KV_NAME repo var unset — re-apply bootstrap/fleet}"
          : "${SECRET:?FLEET_META_APP_PEM_KV_SECRET repo var unset — re-apply bootstrap/fleet}"
          pem=$(az keyvault secret show \
            --vault-name "$KV_NAME" \
            --name "$SECRET" \
            --query value -o tsv)
          # Mask each line — `::add-mask::` only handles single lines, so
          # mask line-by-line. Without this a multi-line PEM would slip
          # through the runner's secret scrubber even when the secret as
          # a whole is registered as masked elsewhere.
          while IFS= read -r line; do
            [[ -n "$line" ]] && echo "::add-mask::$line"
          done <<< "$pem"
          # Multi-line $GITHUB_ENV heredoc (delimiter must be unique +
          # not appear in the value — random nonce keeps it robust).
          delim="EOF_$(openssl rand -hex 8)"
          {
            echo "FLEET_META_APP_PEM<<$delim"
            echo "$pem"
            echo "$delim"
          } >> "$GITHUB_ENV"

      # Mint a short-lived (~1h) installation token from the fleet-meta
      # App. The token is consumed by the Terraform `github` provider in
      # `bootstrap/environment` (data sources + per-env environment
      # creation + variable writes). Restricted to the fleet repo via
      # `owner` + `repositories`; the App's installation may include
      # other repos (e.g. team-template) but those don't need access
      # from this workflow. The action revokes the token automatically
      # in its `post:` step on job completion.
      - name: Mint fleet-meta App installation token
        id: meta_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id:    ${{ vars.FLEET_META_APP_CLIENT_ID }}
          private-key:  ${{ env.FLEET_META_APP_PEM }}
          owner:        ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: terraform init
        uses: ./.github/actions/tf-backend-config
        with:
          working-directory: terraform/bootstrap/environment
          state-key: bootstrap/environment/${{ inputs.env }}.tfstate
        env:
          TFSTATE_RESOURCE_GROUP:  ${{ vars.TFSTATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER:       ${{ vars.TFSTATE_CONTAINER }}
          AZURE_SUBSCRIPTION_ID:   ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: terraform ${{ inputs.action }}
        working-directory: terraform/bootstrap/environment
        env:
          ARM_USE_OIDC: "true"
          # Terraform `github` provider auth — installation token from
          # the fleet-meta App, scoped to the fleet repo, ~1h TTL.
          GITHUB_TOKEN: ${{ steps.meta_token.outputs.token }}
          ENV: ${{ inputs.env }}
          ACTION: ${{ inputs.action }}
          # Bare-JSON values from env-scoped repo vars deserialise into
          # Terraform's typed inputs (`map(string)` / `string`) without
          # extra quoting because valid JSON is valid HCL on the
          # tfvars channel. See variable comments in
          # `terraform/bootstrap/environment/variables.tf`.
          TF_VAR_mgmt_vnet_resource_ids: ${{ vars.MGMT_VNET_RESOURCE_IDS }}
          TF_VAR_fleet_meta_principal_id: ${{ vars.FLEET_META_PRINCIPAL_ID }}
          TF_VAR_fleet_github_owner_id: ${{ vars.FLEET_GITHUB_OWNER_ID }}
          TF_VAR_fleet_github_repo_id: ${{ vars.FLEET_GITHUB_REPO_ID }}
        run: |
          set -euo pipefail
          case "$ACTION" in
            plan)  terraform plan  -no-color -var "env=$ENV" ;;
            apply) terraform apply -auto-approve       -var "env=$ENV" ;;
            *) echo "unknown action: $ACTION" >&2; exit 1 ;;
          esac

      - name: Summarise outputs
        if: inputs.action == 'apply'
        working-directory: terraform/bootstrap/environment
        run: |
          echo "### env=${{ inputs.env }} outputs" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          terraform output -json | jq 'with_entries(.value |= .value)' \
            >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
