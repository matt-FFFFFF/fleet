name: tf-apply

# Post-merge Terraform apply pipeline. PLAN §10:
#
#   - `push` to main; self-hosted runners (private tfstate + KV).
#   - Change detection identical to `tf-plan.yaml` — same script, same
#     rules. Re-plans fresh on the merge commit rather than replaying
#     the PR's plan artefact (safer: base has advanced).
#   - Per-cluster leg runs once per affected cluster. Each job is a
#     SINGLE matrix leg that runs Stage 1 apply → pipes Stage 1
#     outputs into `stage2.auto.tfvars.json` → mints an AAD access token
#     into `TF_VAR_aks_access_token` → Stage 2 apply. Sequential within
#     the job. Blast-radius control is left to the PR boundary: one PR
#     per env (or per cluster) keeps the affected-clusters set narrow,
#     so we do not cap `max-parallel` at workflow level.
#   - On the **management** cluster only (cluster.yaml `cluster.role:
#     management`), Stage 1 apply additionally publishes a small set of
#     fleet-scope repo variables (`ACR_*` post-Step-1 absorption are
#     published from `bootstrap/environment` env=mgmt; `ARGO_AAD_APP_ID`,
#     `KARGO_*`, `KARGO_MGMT_UAMI_*`, `MGMT_CLUSTER_KV_ID`,
#     `MGMT_AKS_*` published here) for spoke Stage 1/2 to consume.
#
# Stage 2 is scaffolded below as a commented-out block; enable in
# lockstep with the `terraform/stages/2-kubernetes/` module landing.

on:
  push:
    branches: [main]
    paths:
      - 'clusters/**'
      - 'terraform/stages/**'
      - 'terraform/modules/**'
      - '.github/workflows/tf-apply.yaml'
      - '.github/scripts/detect-affected-clusters.sh'

concurrency:
  group: tf-apply-main
  cancel-in-progress: false   # serialise applies; never cancel mid-apply

permissions:
  contents: read

# Force GitHub Actions' canonical bash invocation
# (`bash --noprofile --norc -eo pipefail {0}`) on every `run:` step.
# Self-hosted runner images often default to `bash -e {0}` *without*
# pipefail, which silently swallows errors in pipelines such as
# `terraform plan ... | tee plan.txt` (tee exits 0, the step turns
# green, and a failed plan/apply masquerades as success). The
# explicit default keeps hosted and self-hosted behaviour identical.
defaults:
  run:
    shell: bash

# Note: `id-token: write` is granted at job-level on the jobs that
# call `azure/login` (cluster). Granting it workflow-wide would force
# every job — including the utility `detect` job without an
# `environment:` — to satisfy `include_claim_keys=environment`, which
# `bootstrap/fleet` configures repo-wide. GitHub refuses to start such
# jobs with the error "the claim 'environment' cannot be `null` or
# empty".

jobs:
  detect:
    name: detect affected
    runs-on: ubuntu-24.04
    outputs:
      clusters:    ${{ steps.detect.outputs.clusters }}
      any:         ${{ steps.detect.outputs.any }}
      initialized: ${{ steps.init_guard.outputs.initialized }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Initialisation guard
        id: init_guard
        uses: ./.github/actions/fleet-initialized

      - name: Detect
        id: detect
        env:
          INITIALIZED: ${{ steps.init_guard.outputs.initialized }}
          BASE_REF: HEAD~1
          HEAD_REF: HEAD
        run: |
          if [[ "$INITIALIZED" != "true" ]]; then
            # Emit valid-JSON defaults so downstream `fromJSON(...)`
            # expressions don't hard-fail on empty strings.
            echo 'clusters=[]'    >> "$GITHUB_OUTPUT"
            echo 'any=false'      >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Diff against the commit that was at HEAD~1 prior to the merge
          # — every PR merged to main is a merge commit with one
          # first-parent and one second-parent; `HEAD~1` is the previous
          # main tip, which is what we want to compare against.
          result="$(.github/scripts/detect-affected-clusters.sh)"
          echo "$result" | jq .
          clusters="$(echo "$result" | jq -c .clusters)"
          any="$(echo "$clusters" | jq 'length > 0')"
          echo "clusters=$clusters" >> "$GITHUB_OUTPUT"
          echo "any=$any" >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------------
  # Per-cluster apply. Single job per cluster runs Stage 1 → Stage 2.
  # -------------------------------------------------------------------------
  cluster:
    name: apply ${{ matrix.cluster.env }}/${{ matrix.cluster.region }}/${{ matrix.cluster.name }}
    needs: detect
    if: |
      needs.detect.outputs.initialized == 'true' &&
      fromJSON(needs.detect.outputs.clusters)[0] != null
    runs-on: [self-hosted]
    environment: fleet-${{ matrix.cluster.env }}
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        cluster: ${{ fromJSON(needs.detect.outputs.clusters) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read Terraform version
        id: tf_version
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ steps.tf_version.outputs.version }}
          terraform_wrapper: false

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Render tfvars
        id: tfvars
        env:
          CLUSTER_PATH: ${{ matrix.cluster.path }}
        run: |
          terraform/config-loader/load.sh "$CLUSTER_PATH" \
            > "$RUNNER_TEMP/stage1.tfvars.json"
          echo "file=$RUNNER_TEMP/stage1.tfvars.json" >> "$GITHUB_OUTPUT"

      - name: Stage 1 — init
        uses: ./.github/actions/tf-backend-config
        with:
          working-directory: terraform/stages/1-cluster
          state-key: ${{ matrix.cluster.region }}/${{ matrix.cluster.name }}/stage1.tfstate
        env:
          TFSTATE_RESOURCE_GROUP:  ${{ vars.TFSTATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER:       ${{ vars.TFSTATE_CONTAINER }}
          AZURE_SUBSCRIPTION_ID:   ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Stage 1 — apply
        working-directory: terraform/stages/1-cluster
        env:
          ARM_USE_OIDC: "true"
          TFVARS: ${{ steps.tfvars.outputs.file }}
          # Fleet-scope repo variables. Post-REFACTOR.md:
          #   ACR_RESOURCE_ID                — bootstrap/environment env=mgmt
          #   MGMT_CLUSTER_KV_ID             — Stage 1 mgmt (this workflow,
          #                                     publish step below; spoke ESO
          #                                     scope)
          #   KARGO_MGMT_UAMI_PRINCIPAL_ID   — Stage 1 mgmt (this workflow)
          #   MGMT_AKS_OIDC_ISSUER_URL       — Stage 1 mgmt (this workflow,
          #                                     `MGMT_AKS_*` block)
          TF_VAR_acr_resource_id:                   ${{ vars.ACR_RESOURCE_ID }}
          TF_VAR_mgmt_cluster_kv_id:                ${{ vars.MGMT_CLUSTER_KV_ID }}
          TF_VAR_kargo_mgmt_uami_principal_id:      ${{ vars.KARGO_MGMT_UAMI_PRINCIPAL_ID }}
          TF_VAR_mgmt_aks_oidc_issuer_url:          ${{ vars.MGMT_AKS_OIDC_ISSUER_URL }}
          TF_VAR_fleet_env_uami_principal_id:       ${{ vars.FLEET_ENV_UAMI_PRINCIPAL_ID }}
          TF_VAR_env_monitor_workspace_id:          ${{ vars.MONITOR_WORKSPACE_ID }}
          TF_VAR_env_dce_id:                        ${{ vars.DCE_ID }}
          TF_VAR_env_action_group_id:               ${{ vars.ACTION_GROUP_ID }}
          TF_VAR_env_region_vnet_resource_id:       ${{ vars[format('{0}_{1}_VNET_RESOURCE_ID', matrix.cluster.env, matrix.cluster.region)] }}
          TF_VAR_node_asg_resource_id:              ${{ vars[format('{0}_{1}_NODE_ASG_RESOURCE_ID', matrix.cluster.env, matrix.cluster.region)] }}
          TF_VAR_route_table_resource_id:           ${{ vars[format('{0}_{1}_ROUTE_TABLE_RESOURCE_ID', matrix.cluster.env, matrix.cluster.region)] }}
          TF_VAR_mgmt_vnet_resource_ids_json:       ${{ vars.MGMT_VNET_RESOURCE_IDS }}
        run: terraform apply -auto-approve -var-file="$TFVARS"

      # ---------------------------------------------------------------------
      # Mgmt-only: publish a curated set of Stage 1 outputs to fleet-scope
      # repo variables for spoke clusters' Stage 1 (and every cluster's
      # Stage 2) to consume. Gated on the cluster's `role`, NOT its `env`:
      # env=mgmt may in principle hold non-management clusters, and only
      # the role==`management` cluster owns the fleet-wide AAD apps,
      # mgmt cluster KV, and Kargo mgmt UAMI (PLAN §1: hard-limit one
      # mgmt cluster per fleet, enforced upstream in
      # `bootstrap/environment` env=mgmt).
      #
      # Authentication: the env-scope UAMI (`uami-fleet-mgmt`) holds
      # `Variables: write` repo permission via the fleet-meta GitHub App
      # token minted by `actions/create-github-app-token` (PLAN §10).
      # The action is invoked with the fleet-meta App's PEM read from
      # the runners KV; no static GH PAT is required.
      #
      # Published variables:
      #   MGMT_CLUSTER_KV_ID                 — spoke Stage 1 (`ra_eso_mgmt_cluster_kv`)
      #   ARGO_AAD_APP_ID                    — every cluster's Stage 2
      #   KARGO_AAD_APP_ID                   — mgmt Stage 2 (Kargo Helm values)
      #   KARGO_AAD_APPLICATION_OBJECT_ID    — vestigial; kept for adopters
      #                                        with external integrations
      #   KARGO_MGMT_UAMI_PRINCIPAL_ID       — spoke Stage 1 (AKS RBAC Reader)
      #   KARGO_MGMT_UAMI_CLIENT_ID          — mgmt Stage 2 (Kargo SA WI annotation)
      #   MGMT_AKS_OIDC_ISSUER_URL           — spoke Stage 1 (fc-argocd-spoke FIC)
      #   MGMT_AKS_HOST                      — spoke Stage 2 (mgmt-aliased k8s provider)
      #   MGMT_AKS_CLUSTER_CA_CERTIFICATE    — same
      #   MGMT_AKS_CLUSTER_RESOURCE_ID       — spoke Stage 2 (AAD-token scope)
      # ---------------------------------------------------------------------
      - name: Fetch fleet-meta App PEM from KV (mgmt-only)
        if: matrix.cluster.role == 'management'
        env:
          KV_NAME: ${{ vars.RUNNERS_KV_NAME }}
          SECRET:  ${{ vars.FLEET_META_APP_PEM_KV_SECRET }}
        run: |
          set -euo pipefail
          : "${KV_NAME:?RUNNERS_KV_NAME repo var unset — re-apply bootstrap/fleet}"
          : "${SECRET:?FLEET_META_APP_PEM_KV_SECRET repo var unset — re-apply bootstrap/fleet}"
          pem=$(az keyvault secret show \
            --vault-name "$KV_NAME" \
            --name "$SECRET" \
            --query value -o tsv)
          while IFS= read -r line; do
            [[ -n "$line" ]] && echo "::add-mask::$line"
          done <<< "$pem"
          delim="EOF_$(openssl rand -hex 8)"
          {
            echo "FLEET_META_APP_PEM<<$delim"
            echo "$pem"
            echo "$delim"
          } >> "$GITHUB_ENV"

      - name: Mint fleet-meta App token (mgmt-only)
        if: matrix.cluster.role == 'management'
        id: fleet_meta_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id:    ${{ vars.FLEET_META_APP_CLIENT_ID }}
          private-key:  ${{ env.FLEET_META_APP_PEM }}
          owner:        ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Publish mgmt Stage 1 outputs → repo vars (mgmt-only)
        if: matrix.cluster.role == 'management'
        working-directory: terraform/stages/1-cluster
        env:
          GH_TOKEN: ${{ steps.fleet_meta_token.outputs.token }}
          OWNER:    ${{ github.repository_owner }}
          REPO:     ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          j="$(terraform output -json)"
          extract() { echo "$j" | jq -r --arg k "$1" '.[$k].value // ""'; }
          upsert() {
            local name="$1" value="$2"
            if [[ -z "$value" || "$value" == "null" ]]; then
              echo "skip $name (empty)"; return 0
            fi
            if gh api "repos/$OWNER/$REPO/actions/variables/$name" >/dev/null 2>&1; then
              gh api -X PATCH "repos/$OWNER/$REPO/actions/variables/$name" \
                -f name="$name" -f value="$value"
            else
              gh api -X POST "repos/$OWNER/$REPO/actions/variables" \
                -f name="$name" -f value="$value"
            fi
          }
          upsert MGMT_CLUSTER_KV_ID              "$(extract mgmt_cluster_keyvault_id)"
          upsert KARGO_MGMT_UAMI_PRINCIPAL_ID    "$(extract kargo_mgmt_uami_principal_id)"
          upsert KARGO_MGMT_UAMI_CLIENT_ID       "$(extract kargo_mgmt_uami_client_id)"
          upsert MGMT_AKS_OIDC_ISSUER_URL        "$(extract aks_oidc_issuer_url)"
          upsert MGMT_AKS_HOST                   "$(extract aks_host)"
          upsert MGMT_AKS_CLUSTER_CA_CERTIFICATE "$(extract aks_cluster_ca_certificate)"
          upsert MGMT_AKS_CLUSTER_RESOURCE_ID    "$(extract aks_cluster_resource_id)"

      # TODO(stage2): uncomment when `terraform/stages/2-kubernetes/` lands.
      #
      # - name: Stage 1 outputs → Stage 2 tfvars
      #   working-directory: terraform/stages/1-cluster
      #   run: |
      #     terraform output -json \
      #       | jq 'with_entries(.value |= .value)' \
      #       > "$RUNNER_TEMP/stage2.auto.tfvars.json"
      #     cp "$RUNNER_TEMP/stage2.auto.tfvars.json" \
      #       ../../../terraform/stages/2-kubernetes/
      #
      # - name: Mint AAD access token → TF_VAR_aks_access_token
      #   env:
      #     # `.github/scripts/mint-aks-token.sh` performs the curl/jq
      #     # recipe in PLAN §4 Stage 2. Emits `TF_VAR_aks_access_token`
      #     # into `$GITHUB_ENV` and `::add-mask::`s it.
      #   run: .github/scripts/mint-aks-token.sh
      #
      # - name: Stage 2 — init
      #   uses: ./.github/actions/tf-backend-config
      #   with:
      #     working-directory: terraform/stages/2-kubernetes
      #     state-key: ${{ matrix.cluster.region }}/${{ matrix.cluster.name }}/stage2.tfstate
      #   env:
      #     TFSTATE_RESOURCE_GROUP:  ${{ vars.TFSTATE_RESOURCE_GROUP }}
      #     TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      #     TFSTATE_CONTAINER:       ${{ vars.TFSTATE_CONTAINER }}
      #     AZURE_SUBSCRIPTION_ID:   ${{ vars.AZURE_SUBSCRIPTION_ID }}
      #
      # - name: Stage 2 — apply
      #   working-directory: terraform/stages/2-kubernetes
      #   env:
      #     ARM_USE_OIDC: "true"
      #   run: terraform apply -auto-approve
