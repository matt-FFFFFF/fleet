name: tf-apply

# Post-merge Terraform apply pipeline. PLAN §10:
#
#   - `push` to main; self-hosted runners (private tfstate + KV).
#   - Replays the PR's saved plan artefacts (`plan-*` from `tf-plan.yaml`)
#     instead of re-planning fresh. Terraform's stale-plan check is the
#     drift signal: if state has advanced under the plan, `terraform apply
#     plan.tfplan` refuses with "Saved plan is stale" and the apply
#     fails loudly. The pre-F25 behaviour (re-plan + apply on the merge
#     commit) silently absorbed drift, so reviewed plan ≠ applied plan
#     was undetectable. See PLAN §10 "saved-plan replay" + docs/findings.md
#     F25 (deleted on close).
#   - Per-cluster matrix is built from the downloaded plan set (one
#     matrix leg per `meta.json` recovered from the artefacts). The PR's
#     plan set IS the source of truth — `detect-affected-clusters.sh` is
#     not re-run here. If a path-filtered tf-plan run produced zero
#     plans (e.g. docs-only push to main, or push to main without an
#     associated PR), apply skips with success.
#   - On the **management** cluster only (cluster.yaml `cluster.role:
#     management`, recovered from meta.json), Stage 1 apply additionally
#     publishes a small set of fleet-scope repo variables
#     (`MGMT_CLUSTER_KV_ID`, `KARGO_*`, `MGMT_AKS_*`, etc.) for spoke
#     Stage 1/2 to consume.
#
# Stage 2 is scaffolded below as a commented-out block; enable in
# lockstep with the `terraform/stages/2-kubernetes/` module landing.
# Stage 2 will follow the same saved-plan replay contract via its own
# `plan-stage2-*` artefacts.

on:
  push:
    branches: [main]
    paths:
      - 'clusters/**'
      - 'terraform/stages/**'
      - 'terraform/modules/**'
      - '.github/workflows/tf-apply.yaml'
      - '.github/scripts/detect-affected-clusters.sh'

concurrency:
  group: tf-apply-main
  cancel-in-progress: false   # serialise applies; never cancel mid-apply

permissions:
  contents: read
  # Read access to Pull Requests so the discover job can resolve the PR
  # number associated with the merge commit (used to scope the artefact
  # download to the merging PR's tf-plan run).
  pull-requests: read
  # Read access to Actions so dawidd6/action-download-artifact can list
  # workflow runs and download artefacts from the matching tf-plan run.
  actions: read

# Force GitHub Actions' canonical bash invocation
# (`bash --noprofile --norc -eo pipefail {0}`) on every `run:` step.
# Self-hosted runner images often default to `bash -e {0}` *without*
# pipefail, which silently swallows errors in pipelines such as
# `terraform plan ... | tee plan.txt` (tee exits 0, the step turns
# green, and a failed plan/apply masquerades as success). The
# explicit default keeps hosted and self-hosted behaviour identical.
defaults:
  run:
    shell: bash

# Note: `id-token: write` is granted at job-level on the jobs that
# call `azure/login` (cluster). Granting it workflow-wide would force
# every job — including the utility `discover` job without an
# `environment:` — to satisfy `include_claim_keys=environment`, which
# `bootstrap/fleet` configures repo-wide. GitHub refuses to start such
# jobs with the error "the claim 'environment' cannot be `null` or
# empty".

jobs:
  discover:
    name: discover plan artefacts
    runs-on: [self-hosted]
    outputs:
      pr:           ${{ steps.find_pr.outputs.number }}
      clusters:     ${{ steps.collect.outputs.clusters }}
      any:          ${{ steps.collect.outputs.any }}
      initialized:  ${{ steps.init_guard.outputs.initialized }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialisation guard
        id: init_guard
        uses: ./.github/actions/fleet-initialized

      # Resolve the PR associated with the merge commit. Squash-merge
      # produces a brand-new SHA on main; the PR's tf-plan workflow ran
      # on the PR's *head* commit, which differs. The most reliable
      # lookup is `repos/<owner>/<repo>/commits/<sha>/pulls`, which
      # returns every PR that contains the commit (closed or merged).
      # We pick the first entry — for squash-merge there is exactly one.
      # For direct pushes to main with no associated PR, the API returns
      # `[]` and we emit an empty number; the artefact download step
      # then yields zero plans and the cluster job skips.
      - name: Find associated PR
        id: find_pr
        if: steps.init_guard.outputs.initialized == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          SHA:      ${{ github.sha }}
          REPO:     ${{ github.repository }}
        run: |
          set -euo pipefail
          number="$(gh api "repos/${REPO}/commits/${SHA}/pulls" --jq '.[0].number // empty' || true)"
          if [[ -z "$number" ]]; then
            echo "No PR associated with ${SHA} (likely a direct push to main); apply will skip." >&2
          else
            echo "Found PR #${number} for ${SHA}" >&2
          fi
          echo "number=${number}" >> "$GITHUB_OUTPUT"

      # Download every plan-* artefact from the matching tf-plan run.
      # `if_no_artifact_found: warn` keeps the job green when the PR
      # produced zero plans (e.g. the PR only touched paths outside
      # tf-plan.yaml's path-filter set). For direct pushes to main
      # (no PR) we skip the download entirely — `pr` is empty and
      # dawidd6 would otherwise error.
      - name: Download PR plan artefacts
        id: download
        if: steps.init_guard.outputs.initialized == 'true' && steps.find_pr.outputs.number != ''
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          github_token:         ${{ github.token }}
          workflow:             tf-plan.yaml
          pr:                   ${{ steps.find_pr.outputs.number }}
          workflow_conclusion:  success
          name:                 plan-
          name_is_regexp:       true
          path:                 plans
          if_no_artifact_found: warn

      # Build the matrix from the downloaded plan set's meta.json files.
      # Each plan-* artefact contains a meta.json with the cluster shape
      # (path, env, region, name, role, stage). We collect Stage 1
      # entries here; Stage 2 (when enabled) lives in its own
      # plan-stage2-* artefacts and is consumed by the same matrix in a
      # later step inside the cluster job.
      - name: Collect cluster matrix from plans
        id: collect
        if: steps.init_guard.outputs.initialized == 'true'
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Stage 1 artefacts are named `plan-<env>-<region>-<name>`.
          # Stage 2 artefacts (future) are named `plan-stage2-...` and
          # are picked up by a separate step inside the cluster job.
          stage1_dirs=(plans/plan-*)
          # Filter out any plan-stage2-* directories that future tf-plan
          # uploads may produce (the regex download grabs the union).
          filtered=()
          for d in "${stage1_dirs[@]+"${stage1_dirs[@]}"}"; do
            base="${d#plans/}"
            [[ "$base" == plan-stage2-* ]] && continue
            filtered+=("$d")
          done
          if (( ${#filtered[@]} == 0 )); then
            echo "No Stage 1 plan artefacts; apply will skip." >&2
            echo 'clusters=[]'   >> "$GITHUB_OUTPUT"
            echo 'any=false'     >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Each meta.json carries one cluster object; jq -cs '.' across
          # them all assembles the matrix list.
          metas=()
          for d in "${filtered[@]}"; do
            if [[ -f "$d/meta.json" ]]; then
              metas+=("$d/meta.json")
            else
              echo "WARNING: $d has no meta.json; skipping (was the artefact produced by a pre-F25 tf-plan run?)" >&2
            fi
          done
          if (( ${#metas[@]} == 0 )); then
            echo "No meta.json files found in plan artefacts; apply will skip." >&2
            echo 'clusters=[]'   >> "$GITHUB_OUTPUT"
            echo 'any=false'     >> "$GITHUB_OUTPUT"
            exit 0
          fi
          clusters="$(jq -cs '.' "${metas[@]}")"
          echo "$clusters" | jq .
          echo "clusters=${clusters}" >> "$GITHUB_OUTPUT"
          echo 'any=true'              >> "$GITHUB_OUTPUT"

  # -------------------------------------------------------------------------
  # Per-cluster apply. Single job per cluster runs Stage 1 → Stage 2 by
  # replaying each stage's saved plan from the PR.
  # -------------------------------------------------------------------------
  cluster:
    name: apply ${{ matrix.cluster.env }}/${{ matrix.cluster.region }}/${{ matrix.cluster.name }}
    needs: discover
    if: |
      needs.discover.outputs.initialized == 'true' &&
      needs.discover.outputs.any == 'true'
    runs-on: [self-hosted]
    environment: fleet-${{ matrix.cluster.env }}
    permissions:
      contents:      read
      id-token:      write
      actions:       read
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        cluster: ${{ fromJSON(needs.discover.outputs.clusters) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read Terraform version
        id: tf_version
        run: echo "version=$(cat .terraform-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ steps.tf_version.outputs.version }}
          terraform_wrapper: false

      - name: Azure login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Re-download just this cluster's Stage 1 plan into the working
      # directory. Identical lookup to the `discover` job; performed
      # per-job so each matrix leg is self-contained (no inter-job
      # artefact-passing dance) and the same stale-plan abort fires
      # locally.
      - name: Download Stage 1 plan for this cluster
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          github_token:         ${{ github.token }}
          workflow:             tf-plan.yaml
          pr:                   ${{ needs.discover.outputs.pr }}
          workflow_conclusion:  success
          name:                 plan-${{ matrix.cluster.env }}-${{ matrix.cluster.region }}-${{ matrix.cluster.name }}
          path:                 terraform/stages/1-cluster
          if_no_artifact_found: fail

      - name: Stage 1 — init
        uses: ./.github/actions/tf-backend-config
        with:
          working-directory: terraform/stages/1-cluster
          state-key: ${{ matrix.cluster.region }}/${{ matrix.cluster.name }}/stage1.tfstate
        env:
          TFSTATE_RESOURCE_GROUP:  ${{ vars.TFSTATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER:       ${{ vars.TFSTATE_CONTAINER }}
          AZURE_SUBSCRIPTION_ID:   ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Replay the saved plan. `terraform apply <plan-file>` does not
      # accept `-var` / `-var-file` (variables are baked into the plan),
      # so the long TF_VAR_* env-var block from the pre-F25 re-plan
      # pattern is gone. If state has drifted under the plan, Terraform
      # refuses with "Saved plan is stale" and the apply fails — which
      # is the desired drift signal (PLAN §10; F25).
      - name: Stage 1 — apply (replay saved plan)
        working-directory: terraform/stages/1-cluster
        env:
          ARM_USE_OIDC: "true"
        run: terraform apply -auto-approve plan.tfplan

      # ---------------------------------------------------------------------
      # Mgmt-only: publish a curated set of Stage 1 outputs to fleet-scope
      # repo variables for spoke clusters' Stage 1 (and every cluster's
      # Stage 2) to consume. Gated on the cluster's `role`, NOT its `env`:
      # env=mgmt may in principle hold non-management clusters, and only
      # the role==`management` cluster owns the fleet-wide AAD apps,
      # mgmt cluster KV, and Kargo mgmt UAMI (PLAN §1: hard-limit one
      # mgmt cluster per fleet, enforced upstream in
      # `bootstrap/environment` env=mgmt).
      #
      # Authentication: the env-scope UAMI (`uami-fleet-mgmt`) holds
      # `Variables: write` repo permission via the fleet-meta GitHub App
      # token minted by `actions/create-github-app-token` (PLAN §10).
      # The action is invoked with the fleet-meta App's PEM read from
      # the runners KV; no static GH PAT is required.
      #
      # Published variables:
      #   MGMT_CLUSTER_KV_ID                 — spoke Stage 1 (`ra_eso_mgmt_cluster_kv`)
      #   ARGO_AAD_APP_ID                    — every cluster's Stage 2
      #   KARGO_AAD_APP_ID                   — mgmt Stage 2 (Kargo Helm values)
      #   KARGO_AAD_APPLICATION_OBJECT_ID    — vestigial; kept for adopters
      #                                        with external integrations
      #   KARGO_MGMT_UAMI_PRINCIPAL_ID       — spoke Stage 1 (AKS RBAC Reader)
      #   KARGO_MGMT_UAMI_CLIENT_ID          — mgmt Stage 2 (Kargo SA WI annotation)
      #   MGMT_AKS_OIDC_ISSUER_URL           — spoke Stage 1 (fc-argocd-spoke FIC)
      #   MGMT_AKS_HOST                      — spoke Stage 2 (mgmt-aliased k8s provider)
      #   MGMT_AKS_CLUSTER_CA_CERTIFICATE    — same
      #   MGMT_AKS_CLUSTER_RESOURCE_ID       — spoke Stage 2 (AAD-token scope)
      # ---------------------------------------------------------------------
      - name: Fetch fleet-meta App PEM from KV (mgmt-only)
        if: matrix.cluster.role == 'management'
        env:
          KV_NAME: ${{ vars.RUNNERS_KV_NAME }}
          SECRET:  ${{ vars.FLEET_META_APP_PEM_KV_SECRET }}
        run: |
          set -euo pipefail
          : "${KV_NAME:?RUNNERS_KV_NAME repo var unset — re-apply bootstrap/fleet}"
          : "${SECRET:?FLEET_META_APP_PEM_KV_SECRET repo var unset — re-apply bootstrap/fleet}"
          pem=$(az keyvault secret show \
            --vault-name "$KV_NAME" \
            --name "$SECRET" \
            --query value -o tsv)
          while IFS= read -r line; do
            [[ -n "$line" ]] && echo "::add-mask::$line"
          done <<< "$pem"
          delim="EOF_$(openssl rand -hex 8)"
          {
            echo "FLEET_META_APP_PEM<<$delim"
            echo "$pem"
            echo "$delim"
          } >> "$GITHUB_ENV"

      - name: Mint fleet-meta App token (mgmt-only)
        if: matrix.cluster.role == 'management'
        id: fleet_meta_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id:    ${{ vars.FLEET_META_APP_CLIENT_ID }}
          private-key:  ${{ env.FLEET_META_APP_PEM }}
          owner:        ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Publish mgmt Stage 1 outputs → repo vars (mgmt-only)
        if: matrix.cluster.role == 'management'
        working-directory: terraform/stages/1-cluster
        env:
          GH_TOKEN: ${{ steps.fleet_meta_token.outputs.token }}
          OWNER:    ${{ github.repository_owner }}
          REPO:     ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          j="$(terraform output -json)"
          extract() { echo "$j" | jq -r --arg k "$1" '.[$k].value // ""'; }
          upsert() {
            local name="$1" value="$2"
            if [[ -z "$value" || "$value" == "null" ]]; then
              echo "skip $name (empty)"; return 0
            fi
            if gh api "repos/$OWNER/$REPO/actions/variables/$name" >/dev/null 2>&1; then
              gh api -X PATCH "repos/$OWNER/$REPO/actions/variables/$name" \
                -f name="$name" -f value="$value"
            else
              gh api -X POST "repos/$OWNER/$REPO/actions/variables" \
                -f name="$name" -f value="$value"
            fi
          }
          upsert MGMT_CLUSTER_KV_ID              "$(extract mgmt_cluster_keyvault_id)"
          upsert KARGO_MGMT_UAMI_PRINCIPAL_ID    "$(extract kargo_mgmt_uami_principal_id)"
          upsert KARGO_MGMT_UAMI_CLIENT_ID       "$(extract kargo_mgmt_uami_client_id)"
          upsert MGMT_AKS_OIDC_ISSUER_URL        "$(extract aks_oidc_issuer_url)"
          upsert MGMT_AKS_HOST                   "$(extract aks_host)"
          upsert MGMT_AKS_CLUSTER_CA_CERTIFICATE "$(extract aks_cluster_ca_certificate)"
          upsert MGMT_AKS_CLUSTER_RESOURCE_ID    "$(extract aks_cluster_resource_id)"

      # TODO(stage2): uncomment when `terraform/stages/2-kubernetes/` lands.
      # Stage 2 follows the same saved-plan replay contract (PLAN §10;
      # F25): tf-plan emits a separate `plan-stage2-<env>-<region>-<name>`
      # artefact, and tf-apply downloads + replays it here, after Stage 1.
      # The Stage 1 outputs → Stage 2 tfvars handoff and the AAD token
      # mint still happen in this job (the saved Stage 2 plan does not
      # include the AAD token; it is consumed by the kubernetes/helm
      # providers at apply time).
      #
      # - name: Download Stage 2 plan for this cluster
      #   uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
      #   with:
      #     github_token:         ${{ github.token }}
      #     workflow:             tf-plan.yaml
      #     pr:                   ${{ needs.discover.outputs.pr }}
      #     workflow_conclusion:  success
      #     name:                 plan-stage2-${{ matrix.cluster.env }}-${{ matrix.cluster.region }}-${{ matrix.cluster.name }}
      #     path:                 terraform/stages/2-kubernetes
      #     if_no_artifact_found: fail
      #
      # - name: Stage 1 outputs → Stage 2 tfvars
      #   working-directory: terraform/stages/1-cluster
      #   run: |
      #     terraform output -json \
      #       | jq 'with_entries(.value |= .value)' \
      #       > "$RUNNER_TEMP/stage2.auto.tfvars.json"
      #     cp "$RUNNER_TEMP/stage2.auto.tfvars.json" \
      #       ../../../terraform/stages/2-kubernetes/
      #
      # - name: Mint AAD access token → TF_VAR_aks_access_token
      #   env:
      #     # `.github/scripts/mint-aks-token.sh` performs the curl/jq
      #     # recipe in PLAN §4 Stage 2. Emits `TF_VAR_aks_access_token`
      #     # into `$GITHUB_ENV` and `::add-mask::`s it.
      #   run: .github/scripts/mint-aks-token.sh
      #
      # - name: Stage 2 — init
      #   uses: ./.github/actions/tf-backend-config
      #   with:
      #     working-directory: terraform/stages/2-kubernetes
      #     state-key: ${{ matrix.cluster.region }}/${{ matrix.cluster.name }}/stage2.tfstate
      #   env:
      #     TFSTATE_RESOURCE_GROUP:  ${{ vars.TFSTATE_RESOURCE_GROUP }}
      #     TFSTATE_STORAGE_ACCOUNT: ${{ vars.TFSTATE_STORAGE_ACCOUNT }}
      #     TFSTATE_CONTAINER:       ${{ vars.TFSTATE_CONTAINER }}
      #     AZURE_SUBSCRIPTION_ID:   ${{ vars.AZURE_SUBSCRIPTION_ID }}
      #
      # - name: Stage 2 — apply (replay saved plan)
      #   working-directory: terraform/stages/2-kubernetes
